<!DOCTYPE html>
<html>

<head>
    <!-- Title of the webpage -->
    <title>Simple Calculator</title>

    <script>
        // Function to perform calculation based on operator
        function calculate(operator) {

            // Get input values and convert to float
            var num1 = parseFloat(document.getElementById("n1").value);
            var num2 = parseFloat(document.getElementById("n2").value);

            var result;

            // Perform operation using switch case
            switch(operator) {
                case '+':
                    result = num1 + num2;
                    break;

                case '-':
                    result = num1 - num2;
                    break;

                case '*':
                    result = num1 * num2;
                    break;

                case '/':
                    // Handle division by zero
                    if(num2 != 0) {
                        result = num1 / num2;
                    } else {
                        result = "Cannot divide by zero";
                    }
                    break;
            }

            // Display result
            document.getElementById("result").innerHTML = "Result: " + result;
        }
    </script>
</head>

<body>

    <!-- Input fields -->
    Number 1: <input type="number" id="n1" step="any"><br><br>
    Number 2: <input type="number" id="n2" step="any"><br><br>

    <!-- Operation buttons -->
    <button onclick="calculate('+')">Add</button>
    <button onclick="calculate('-')">Subtract</button>
    <button onclick="calculate('*')">Multiply</button>
    <button onclick="calculate('/')">Divide</button>

    <!-- Output display -->
    <p id="result"></p>

    <!-- Name and Registration Number -->
    <div style="position:fixed; bottom:10px; left:10px;">
        Name: Gauravsingh Rajpurohit <br>
        Reg No: 24BCE2208
    </div>

</body>

</html>
