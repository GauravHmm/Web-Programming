<!DOCTYPE html>
<html>
<head>
<title>Login Window</title>
<style>
body{
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background-color: #f0f2f5;
    font-family: Arial, sans-serif;
}
.login-box{
    background-color: white;
    padding: 30px;
    width: 300px;
    border-radius: 8px;
    box-shadow: 0 0 10px rgba(0,0,0,0.2);
    text-align: center;
}
.login-box h2{
    margin-bottom: 20px;
}
.login-box input{
    width: 100%;
    padding: 8px;
    margin: 10px 0;
    border: 1px solid #ccc;
    border-radius: 4px;
}
.login-box button{
    width: 100%;
    padding: 8px;
    background-color: #007bff;
    color: white;
    border: none;
    border-radius: 4px;
    cursor: pointer;
}
.student-info{
    position: fixed;
    bottom: 0;
    left: 0;
    padding: 5px 10px;
    font-size: 14px;
}
</style>
</head>

<body>

<div class="login-box">
    <h2>Login</h2>
    <input type="text" placeholder="Username">
    <input type="password" placeholder="Password">
    <button>Login</button>
</div>

<div class="student-info">
Name: Gauravsingh Rajpurohit <br>
Reg.No: 24BCE2208
</div>

</body>
</html>
