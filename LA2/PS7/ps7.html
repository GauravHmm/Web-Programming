<!DOCTYPE html>
<html>
<head>
<title>Element Prefixed Class Selector</title>
<style>
h2.shared{
    color: blue;
}
p.shared{
    background-color: lightblue;
    padding: 10px;
}
.student-info{
    position: fixed;
    bottom: 0;
    left: 0;
    padding: 5px 10px;
    font-size: 14px;
}
</style>
</head>

<body>

<h2 class="shared">Blue Economy and Maritime Growth</h2>

<p class="shared">
The blue economy promotes sustainable use of ocean resources for economic growth and environmental protection.
</p>

<div class="student-info">
Name: Gauravsingh Rajpurohit <br>
Reg.No: 24BCE2208
</div>

</body>
</html>
