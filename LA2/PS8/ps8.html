<!DOCTYPE html>
<html>
<head>
<title>Block and Inline Elements</title>
<style>
div{
    padding: 20px;
    background-color: #f2f2f2;
    width: 300px;
}
span{
    color: red;
    font-weight: bold;
    font-size: 20px;
}
.student-info{
    position: fixed;
    bottom: 0;
    left: 0;
    padding: 5px 10px;
    font-size: 14px;
}
</style>
</head>

<body>

<div>
Agricultural Equipment Price:<br><br>
<span>₹50,000</span>
</div>

<div class="student-info">
Name: Gauravsingh Rajpurohit <br>
Reg.No: 24BCE2208
</div>

</body>
</html>
