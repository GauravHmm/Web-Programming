<!DOCTYPE html>
<html>
<head>
<title>Student Registration Portal</title>
<style>
body{
    margin:0;
    font-family: Arial, sans-serif;
    background-color: skyblue;
}
h1{
    text-align:center;
    padding:20px;
}
nav{
    text-align:center;
    margin-bottom:20px;
}
nav a{
    background-color: darkblue;
    color:white;
    padding:10px 15px;
    margin:5px;
    text-decoration:none;
    border-radius:8px;
    display:inline-block;
}
form{
    width:80%;
    margin:auto;
}
.section{
    background-color: darkblue;
    color:white;
    padding:20px;
    margin-bottom:20px;
    border-radius:10px;
}
.section input, .section select{
    width:100%;
    padding:8px;
    margin:8px 0;
    border:none;
    border-radius:5px;
}
button{
    padding:10px 20px;
    border:none;
    border-radius:5px;
    background-color:white;
    color:darkblue;
    font-weight:bold;
    cursor:pointer;
}
.student-info{
    position:fixed;
    bottom:0;
    left:0;
    padding:5px 10px;
    font-size:14px;
}
</style>
</head>

<body>

<h1>Student Registration Portal</h1>

<nav>
<a href="#personal">Personal Information</a>
<a href="#academic">Academic Details</a>
<a href="#address">Address Information</a>
<a href="#account">Account Credentials</a>
</nav>

<form onsubmit="alert('Form Submitted Successfully')">

<div class="section" id="personal">
<h2>Personal Information</h2>
<input type="text" placeholder="Full Name" required>
<input type="date" required>
<select required>
<option value="">Select Gender</option>
<option>Male</option>
<option>Female</option>
<option>Other</option>
</select>
<input type="email" placeholder="Email Address" required>
<input type="text" placeholder="Mobile Number" required>
</div>

<div class="section" id="academic">
<h2>Academic Details</h2>
<input type="text" placeholder="Register Number" required>
<input type="text" placeholder="Degree Program" required>
<input type="text" placeholder="Department" required>
<input type="text" placeholder="Year of Study" required>
</div>

<div class="section" id="address">
<h2>Address Information</h2>
<input type="text" placeholder="Door Number" required>
<input type="text" placeholder="Street Name" required>
<input type="text" placeholder="City" required>
<input type="text" placeholder="State" required>
<input type="text" placeholder="Pincode" required>
</div>

<div class="section" id="account">
<h2>Account Credentials</h2>
<input type="text" placeholder="Username" required>
<input type="password" placeholder="Password" required>
<input type="password" placeholder="Confirm Password" required>
<button type="submit">Submit</button>
</div>

</form>

<div class="student-info">
Name: Gauravsingh Rajpurohit <br>
Reg.No: 24BCE2208
</div>

</body>
</html>
